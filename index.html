<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Secure DevOps Messaging Panel</title>

<meta name="csrf-token" content="{{ csrf_token() }}">

<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap');

* { margin:0; padding:0; box-sizing:border-box; font-family:'Inter', sans-serif; }

body {
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background: linear-gradient(-45deg,#020617,#0f172a,#1e293b,#020617);
}

#loginOverlay {
    position:fixed;
    width:100%; height:100%;
    background:#020617;
    display:flex;
    justify-content:center;
    align-items:center;
}

.login-box {
    background:#0f172a;
    padding:30px;
    border-radius:20px;
    width:320px;
    display:flex;
    flex-direction:column;
    gap:15px;
}

.container {
    width:900px;
    height:650px;
    display:flex;
    flex-direction:column;
    background: rgba(15,23,42,0.9);
    border-radius:20px;
    overflow:hidden;
}

.header {
    padding:15px;
    display:flex;
    justify-content:space-between;
    color:white;
}

#dashboard {
    display:none;
    padding:10px;
    background:#020617;
    border-bottom:1px solid #334155;
}

.section { margin-bottom:10px; }

.section h4 {
    color:#22c55e;
    margin-bottom:5px;
}

.box {
    background:#020617;
    padding:10px;
    height:120px;
    overflow-y:auto;
    border:1px solid #334155;
    color:white;
}

.messages {
    flex:1;
    overflow-y:auto;
    padding:20px;
}

.msg { margin-bottom:10px; }

.bubble {
    background:#334155;
    color:white;
    padding:10px;
    border-radius:10px;
}

.footer {
    padding:10px;
    display:flex;
    gap:10px;
}

input {
    flex:1;
    padding:10px;
    border-radius:10px;
    border:none;
}

button {
    padding:10px;
    background:#3b82f6;
    border:none;
    border-radius:10px;
    color:white;
    cursor:pointer;
}

button:disabled {
    background: gray;
    cursor: not-allowed;
}
</style>

</head>

<body>

<!-- LOGIN -->
<div id="loginOverlay">
    <div class="login-box">
        <h2 style="color:white;text-align:center;">Secure Login</h2>
        <input id="username" placeholder="Username">
        <input id="password" type="password" placeholder="Password">
        <button id="loginBtn" onclick="login()">Login</button>
        <button onclick="register()">Register</button>
    </div>
</div>

<div class="container">

<div class="header">
    <div>DevOps Secure Panel</div>
    <div>
        <span id="userInfo"></span>
        <button onclick="logout()">Logout</button>
    </div>
</div>

<!-- ADMIN DASHBOARD -->
<div id="dashboard">

<div class="section">
    <h4>Users</h4>
    <div class="box" id="usersBox"></div>
</div>

<div class="section">
    <h4>Logs (Live)</h4>
    <div class="box" id="logsBox"></div>
</div>

<div class="section">
    <h4>Ban User</h4>
    <input id="banUser" placeholder="Username">
    <button onclick="banUser()">Ban</button>
</div>

</div>

<!-- MESSAGES -->
<div class="messages" id="messages">
{% for m in messages %}
<div class="msg"><div class="bubble">{{ m.message }}</div></div>
{% endfor %}
</div>

<div class="footer">
    <input id="msgInput" disabled>
    <button id="sendBtn" onclick="sendMsg()" disabled>Send</button>
</div>

</div>

<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>

<script>
const csrfToken = $("meta[name='csrf-token']").attr("content");

if (!csrfToken) {
    alert("CSRF token missing — backend not configured correctly");
}

/* REGISTER */
function register() {
    $.ajax({
        url: "/register",
        type: "POST",
        data: {
            username: $("#username").val(),
            password: $("#password").val()
        },
        headers: { "X-CSRFToken": csrfToken }
    })
    .done(res => alert(res.status === "success" ? "Registered!" : res.message))
    .fail(err => alert("Register failed"));
}

/* LOGIN */
function login() {
    $("#loginBtn").prop("disabled", true);

    $.ajax({
        url: "/login",
        type: "POST",
        data: {
            username: $("#username").val(),
            password: $("#password").val()
        },
        headers: { "X-CSRFToken": csrfToken }
    })
    .done(res => {
        if (res.status === "success") {
            $("#loginOverlay").hide();
            $("#userInfo").text(res.username + " (" + res.role + ")");

            // enable chat
            $("#msgInput").prop("disabled", false);
            $("#sendBtn").prop("disabled", false);

            if (res.role === "admin") {
                $("#dashboard").show();
                loadUsers();
                loadLogs();
                setInterval(loadLogs, 5000);
            }
        } else {
            alert(res.message);
        }
    })
    .fail(() => alert("Login failed"))
    .always(() => $("#loginBtn").prop("disabled", false));
}

/* USERS */
function loadUsers() {
    $.get("/users")
    .done(data => {
        let html = "";
        data.forEach(u => {
            html += `<div>${u.username} (${u.role})</div>`;
        });
        $("#usersBox").html(html);
    })
    .fail(() => alert("Failed to load users"));
}

/* LOGS */
function loadLogs() {
    $.get("/logs")
    .done(data => {
        let html = "";
        data.forEach(l => {
            html += `<div>${l.event_type} - ${l.username}</div>`;
        });
        $("#logsBox").html(html);
    })
    .fail(() => alert("Failed to load logs"));
}

/* SEND MESSAGE (SAFE) */
function sendMsg() {
    const msg = $("#msgInput").val();

    if (!msg) return;

    $.ajax({
        url: "/submit",
        type: "POST",
        data: { new_message: msg },
        headers: { "X-CSRFToken": csrfToken }
    })
    .done(res => {
        if (res.status === "success") {
            const div = $("<div>").addClass("msg");
            const bubble = $("<div>").addClass("bubble").text(res.message); // SAFE
            div.append(bubble);
            $("#messages").append(div);

            $("#msgInput").val("");
        }
    })
    .fail(() => alert("Message failed"));
}

/* BAN */
function banUser() {
    $.ajax({
        url: "/ban_user",
        type: "POST",
        data: { username: $("#banUser").val() },
        headers: { "X-CSRFToken": csrfToken }
    })
    .done(() => {
        alert("User banned");
        loadUsers();
    })
    .fail(() => alert("Ban failed"));
}

/* LOGOUT */
function logout() {
    $.get("/logout")
    .done(() => location.reload())
    .fail(() => alert("Logout failed"));
}
</script>

</body>
</html>
